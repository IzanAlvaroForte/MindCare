spring.application.name=Mindcarebackend-system
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/mindcare_db
spring.datasource.username=postgres
spring.datasource.password=1
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=mySuperSecretKey1234567890!@#$%^&*()_+ABCDEFGH
jwt.expiration=86400000

logging.level.org.springframework.security=DEBUG
logging.level.com.example.Mindcarebackend_system=DEBUG
